patterns:
  - name: "Pure JDK Protocol Implementation"
    domain: "multi-protocol"
    confidence: 0.95
    description: "Implement protocol clients using only java.net.*, java.io.*, javax.xml.* — no external libraries"
    evidence: "8 protocol samplers (HTTP, WS, SSE, MQTT, gRPC, HLS, WebRTC, DASH) all implemented with zero external deps"
    reinforced_by: ["005-multi-protocol-engine"]

  - name: "SampleResult Universal Contract"
    domain: "load-testing-engine"
    confidence: 0.95
    description: "All protocol samplers output to the same SampleResult (responseBody, responseCode, success, timing)"
    evidence: "Works for request/response (HTTP, gRPC), streaming (SSE, HLS), pub/sub (MQTT, WS), signaling (WebRTC)"
    reinforced_by: ["005-multi-protocol-engine"]

  - name: "NodeInterpreter Switch Dispatch"
    domain: "engine-architecture"
    confidence: 0.90
    description: "Add new sampler types as case branches in NodeInterpreter.dispatchNode()"
    evidence: "8 cases added cleanly without refactoring — pattern scales to 20+ samplers"
    reinforced_by: ["005-multi-protocol-engine"]

  - name: "Parallel Agent Execution (3 max)"
    domain: "squad-operations"
    confidence: 0.85
    description: "Dispatch up to 3 build agents in parallel per wave — more causes file conflicts"
    evidence: "Waves 1-3 all used 3 agents successfully. No merge conflicts observed."
    reinforced_by: ["005-multi-protocol-engine"]

  - name: "Mock Server per Protocol"
    domain: "e2e-testing"
    confidence: 0.90
    description: "Create a lightweight Node.js mock server for each protocol under test"
    evidence: "5 servers built (HTTP, WS, SSE, HLS, MQTT), each <200 lines, Docker-composable"
    reinforced_by: ["005-multi-protocol-engine"]

pitfalls:
  - name: "API Response Field Mismatch"
    domain: "frontend-backend-integration"
    severity: "HIGH"
    description: "TypeScript interfaces may not match actual backend JSON field names (e.g., 'runId' vs 'id')"
    evidence: "Root cause of 'No data yet' bug — took multiple debug cycles to find"
    mitigation: "Always verify TS types against actual curl responses before building UI"
    discovered_by: ["005-multi-protocol-engine"]

  - name: "React 18 Batching + Zustand State Lag"
    domain: "frontend-state-management"
    severity: "HIGH"
    description: "Zustand store updates may not propagate to newly-mounted components in the same React render batch"
    evidence: "runId was set in store but ResultsTabs read null on first render after tab switch"
    mitigation: "Read state directly from store (useRunStore(s => s.runId)) instead of relying on props"
    discovered_by: ["005-multi-protocol-engine"]

  - name: "SSE Event Name Convention"
    domain: "real-time-communication"
    severity: "MEDIUM"
    description: "SSE addEventListener('message') only catches unnamed events — named events need addEventListener('eventName')"
    evidence: "Backend sent 'sample.bucket' named events, frontend listened for generic 'message'"
    mitigation: "Always match addEventListener name to SseEmitter.event().name() on backend"
    discovered_by: ["005-multi-protocol-engine"]

  - name: "Accumulated TS Errors from Type Changes"
    domain: "typescript-maintenance"
    severity: "MEDIUM"
    description: "Changing interface shapes (adding 'id', removing 'runId') breaks test files that use old shapes"
    evidence: "46 TS errors accumulated across 8 test files after API type updates"
    mitigation: "Run tsc --noEmit after every interface change, fix tests immediately"
    discovered_by: ["005-multi-protocol-engine"]
