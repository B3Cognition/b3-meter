calibration_notes: >
  SESSION LEARNINGS:
  1. Build agents with clear specs = 100% first-pass success. Ad-hoc debugging = multiple iterations.
  2. Biggest time sink was integration debugging (UI state, API mismatches), not feature implementation.
  3. Pure JDK approach works for all protocols — no dependency management overhead.
  4. Parallel agent execution (3 at a time) is optimal — more causes file conflicts.
  5. Rework wave (2 agents) closed all gaps efficiently when given precise gap descriptions.
  6. Total: 13 agents, ~75 min wall-clock, 50+ files, 577 Java tests, 0 TS errors.
