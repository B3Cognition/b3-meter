key_learnings:
  - "Agents with clear specs = 100% first-pass success. Ad-hoc debugging = multiple iterations."
  - "Integration debugging (state management, API mismatches) consumes more time than feature implementation."
  - "Template-driven artifacts (LICENSE, CI/CD, Terraform) are 15x faster than estimated."
  - "The pre-processor execution phase was the single largest architectural gap — should have been caught in initial analysis."
  - "Parallel 3-agent waves are optimal — more causes file conflicts."
  - "Building backward compatibility is mostly mechanical — define JMX properties, implement executor, add tests."
  - "Production readiness scoring provides clear targets — easier to improve when you can measure."

risks_materialized:
  - "API response field mismatch (id vs runId) — root cause of the original 'No data yet' bug"
  - "React 18 batching + Zustand state lag between components"
  - "SSE event name mismatch (sample.bucket vs message)"
  - "H2 NOT NULL constraint on tree_data blocking plan auto-creation"
  - "Vite HMR not reliably hot-reloading TypeScript files"
  - "Agent permission issues on first dispatch (Edit/Write tools blocked)"
  - "Agent killed when user exited session mid-task"
  - "Port 8080 conflict on backend restart (fixed with auto-kill in Gradle)"
  - "MQTT mock health endpoint needed separate HTTP port (1884 vs 1883)"
  - "LDAP mock needed npm install for ldapjs dependency"

unpredicted_successes:
