apiVersion: v1
kind: Service
metadata:
  name: {{ include "b3meter.controller.fullname" . }}
  labels:
    {{- include "b3meter.controller.labels" . | nindent 4 }}
spec:
  type: {{ .Values.controller.service.type }}
  ports:
    - port: {{ .Values.controller.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.controller.service.uiPort }}
      targetPort: ui
      protocol: TCP
      name: ui
  selector:
    {{- include "b3meter.controller.selectorLabels" . | nindent 4 }}
