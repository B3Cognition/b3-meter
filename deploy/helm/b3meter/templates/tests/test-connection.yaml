apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "jmeter-next.fullname" . }}-test-connection"
  labels:
    {{- include "jmeter-next.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['sh', '-c']
      args:
        - |
          echo "Testing controller health endpoint..."
          wget -qO- --timeout=10 http://{{ include "jmeter-next.controller.fullname" . }}:{{ .Values.controller.service.httpPort }}/actuator/health
          echo ""
          echo "Testing controller API endpoint..."
          wget -qO- --timeout=10 http://{{ include "jmeter-next.controller.fullname" . }}:{{ .Values.controller.service.httpPort }}/api/v1/plans
          echo ""
          echo "All tests passed."
  restartPolicy: Never
