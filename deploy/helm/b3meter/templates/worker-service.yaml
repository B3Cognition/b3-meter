apiVersion: v1
kind: Service
metadata:
  name: {{ include "b3meter.worker.headlessServiceName" . }}
  labels:
    {{- include "b3meter.worker.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.worker.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.worker.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "b3meter.worker.selectorLabels" . | nindent 4 }}
