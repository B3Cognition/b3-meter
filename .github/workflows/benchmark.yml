name: Benchmark Suite

on:
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Commit the new results as the updated baseline'
        type: boolean
        default: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and run unit tests
        run: ./gradlew test --rerun

      - name: Assemble benchmark runner JAR
        run: ./gradlew :perf:benchmarkJar

      - name: Run benchmark suite
        run: java -jar perf/benchmark-runner.jar

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: perf/results.json
          retention-days: 90

      - name: Update baseline
        if: inputs.update_baseline
        run: |
          cp perf/results.json perf/.baseline.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add perf/.baseline.json
          git commit -m "chore: update perf baseline [skip ci]"
          git push
