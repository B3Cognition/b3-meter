name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  performance-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run full test suite
        run: ./gradlew test

      - name: Performance suite (placeholder)
        run: echo "Performance suite placeholder — wire up JMeter scenario runner when ready"

      - name: JMX corpus L5 validation (placeholder)
        run: echo "JMX corpus L5 validation placeholder — wire up corpus validator when ready"
