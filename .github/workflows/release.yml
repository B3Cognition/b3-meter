name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build
        run: ./gradlew bootJar
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Docker
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          docker build -f Dockerfile.controller -t ghcr.io/${{ github.repository }}/controller:$VERSION .
          docker build -f Dockerfile.worker -t ghcr.io/${{ github.repository }}/worker:$VERSION .
          docker push ghcr.io/${{ github.repository }}/controller:$VERSION
          docker push ghcr.io/${{ github.repository }}/worker:$VERSION
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            modules/web-api/build/libs/*.jar
            modules/worker-node/build/libs/*.jar
          generate_release_notes: true
