name: CI
on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  spotless-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
      - name: License header check
        run: ./gradlew spotlessCheck

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
      - name: Build & Test
        run: ./gradlew build test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: modules/*/build/reports/tests/

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: web-ui
        run: npm ci
      - name: TypeScript check
        working-directory: web-ui
        run: npx tsc --noEmit
      - name: Playwright install
        working-directory: web-ui
        run: npx playwright install --with-deps chromium
      - name: Build
        working-directory: web-ui
        run: npm run build

  docker-build:
    needs: [spotless-check, backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build JARs
        run: ./gradlew bootJar
      - name: Build Docker images
        run: |
          docker build -f Dockerfile.controller -t b3meter/controller:${{ github.sha }} .
          docker build -f Dockerfile.worker -t b3meter/worker:${{ github.sha }} .
