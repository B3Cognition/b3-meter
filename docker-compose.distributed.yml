version: '3.8'
services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    ports:
      - "8080:8080"
    environment:
      WORKER_ADDRESSES: "worker-1:9090,worker-2:9090,worker-3:9090"
    depends_on:
      - worker-1
      - worker-2
      - worker-3

  worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      WORKER_NAME: worker-1
      GRPC_PORT: "9090"

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      WORKER_NAME: worker-2
      GRPC_PORT: "9090"

  worker-3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      WORKER_NAME: worker-3
      GRPC_PORT: "9090"
