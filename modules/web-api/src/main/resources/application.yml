server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: jmeter-next
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:h2:file:./data/jmeter-next;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: jmeter-next

jmeter:
  db:
    mode: sqlite
  http:
    maxConnections: 2000
    maxPerRoute: 200
    connectTimeoutMs: 5000
    socketTimeoutMs: 30000
    keepAliveMs: 30000
