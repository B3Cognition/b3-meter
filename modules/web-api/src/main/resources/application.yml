server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: b3meter
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: b3meter

jmeter:
  http:
    maxConnections: 2000
    maxPerRoute: 200
    connectTimeoutMs: 5000
    socketTimeoutMs: 30000
    keepAliveMs: 30000
  outputs: csv
  output:
    csv:
      file: results.csv
    json:
      file: results.jsonl
    influxdb:
      url: ""
      database: jmeter
      measurement: jmeter_results
      token: ""
    prometheus:
      port: 9270
