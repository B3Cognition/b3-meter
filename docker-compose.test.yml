services:
  http-mock:
    build: ./test-servers/http-mock
    ports:
      - "${HTTP_MOCK_PORT:-9081}:${HTTP_MOCK_PORT:-9081}"
    environment:
      PORT: ${HTTP_MOCK_PORT:-9081}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${HTTP_MOCK_PORT:-9081}/health"]
      interval: 5s
      timeout: 3s
      retries: 5

