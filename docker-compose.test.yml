version: '3.8'
services:
  http-mock:
    build: ./test-servers/http-mock
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  ws-mock:
    build: ./test-servers/ws-mock
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  sse-mock:
    build: ./test-servers/sse-mock
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  hls-mock:
    build: ./test-servers/hls-mock
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  mqtt-mock:
    build: ./test-servers/mqtt-mock
    ports:
      - "1883:1883"

  grpc-mock:
    build: ./test-servers/grpc-mock
    ports:
      - "50051:50051"
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  dash-mock:
    build: ./test-servers/dash-mock
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  jmeter-next:
    build: .
    ports:
      - "8080:8080"
      - "3000:3000"
    depends_on:
      http-mock:
        condition: service_healthy
      ws-mock:
        condition: service_healthy
      sse-mock:
        condition: service_healthy
      hls-mock:
        condition: service_healthy
      grpc-mock:
        condition: service_healthy
      dash-mock:
        condition: service_healthy
